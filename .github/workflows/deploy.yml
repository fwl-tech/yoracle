name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hatch-ai-provisioner to sync secrets
        run: |
          echo "🔄 Triggering hatch-ai-provisioner to sync secrets..."
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PROVISIONER_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/fwl-tech/hatch-ai-provisioner/dispatches \
            -d '{
              "event_type": "provision-secrets",
              "client_payload": {
                "repository": "fwl-tech/yoracle",
                "railway_service_id": "${{ secrets.RAILWAY_SERVICE_ID }}",
                "railway_environment_id": "${{ secrets.RAILWAY_ENVIRONMENT_ID }}"
              }
            }' || echo "⚠️  Provisioner trigger failed, continuing with local secrets..."
          
          echo "Waiting 10 seconds for provisioner to sync secrets..."
          sleep 10

  deploy:
    runs-on: ubuntu-latest
    needs: sync-secrets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Provision Railway environment variables
        run: bash scripts/provision-railway-env.sh
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONNECTOR_ENCRYPTION_KEY: ${{ secrets.CONNECTOR_ENCRYPTION_KEY }}

      - name: Trigger Railway redeploy
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { serviceInstanceRedeploy(serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENVIRONMENT_ID\\\") }\"}")
          echo "Railway response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "Deploy trigger failed"
            exit 1
          fi
          echo "Deploy triggered successfully"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
