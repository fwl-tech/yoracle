name: Deploy to Railway

on:
  push:
    branches: [main]

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hatch-ai-provisioner to sync secrets
        env:
          PROVISIONER_PAT: ${{ secrets.PROVISIONER_PAT }}
        run: |
          set +e
          echo "🔄 Triggering hatch-ai-provisioner to sync secrets..."
          SINCE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          HTTP_STATUS=$(curl -s -o /dev/null -w '%{http_code}' -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PROVISIONER_PAT" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/fwl-tech/hatch-ai-provisioner/dispatches \
            -d '{
              "event_type": "provision-secrets",
              "client_payload": {
                "repository": "fwl-tech/yoracle",
                "railway_service_id": "${{ secrets.RAILWAY_SERVICE_ID }}",
                "railway_environment_id": "${{ secrets.RAILWAY_ENVIRONMENT_ID }}"
              }
            }')

          if [ "$HTTP_STATUS" != "204" ]; then
            echo "::warning::Provisioner trigger failed (HTTP $HTTP_STATUS), continuing with existing secrets"
            exit 0
          fi

          echo "Waiting for hatch-ai-provisioner run to complete (up to 90s)..."
          for i in $(seq 1 18); do
            sleep 5
            RUN_STATUS=$(curl -s \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $PROVISIONER_PAT" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/fwl-tech/hatch-ai-provisioner/actions/runs?event=repository_dispatch&created=%3E%3D$SINCE&per_page=1" \
              | jq -r '.workflow_runs[0].status // "unknown"' 2>/dev/null)
            RUN_STATUS=${RUN_STATUS:-unknown}

            if [ "$RUN_STATUS" = "completed" ]; then
              echo "✅ Provisioner run completed"
              exit 0
            elif [ "$RUN_STATUS" = "unknown" ]; then
              echo "⏳ No provisioner run visible yet, retrying..."
            else
              echo "⏳ Provisioner run status: $RUN_STATUS"
            fi
          done

          echo "::warning::Timed out waiting for provisioner run to complete, continuing with existing secrets"

  deploy:
    runs-on: ubuntu-latest
    needs: sync-secrets
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Provision Railway environment variables
        run: bash scripts/provision-railway-env.sh
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          AUTH_SESSION_SECRET: ${{ secrets.AUTH_SESSION_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CONNECTOR_ENCRYPTION_KEY: ${{ secrets.CONNECTOR_ENCRYPTION_KEY }}

      - name: Trigger Railway redeploy
        run: |
          RESPONSE=$(curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"query\": \"mutation { serviceInstanceRedeploy(serviceId: \\\"$RAILWAY_SERVICE_ID\\\", environmentId: \\\"$RAILWAY_ENVIRONMENT_ID\\\") }\"}")
          echo "Railway response: $RESPONSE"
          if echo "$RESPONSE" | grep -q '"errors"'; then
            echo "Deploy trigger failed"
            exit 1
          fi
          echo "Deploy triggered successfully"
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
          RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID }}
