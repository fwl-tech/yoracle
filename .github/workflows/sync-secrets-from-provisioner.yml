name: Sync Secrets from Provisioner

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync-secrets]

jobs:
  trigger-provisioner:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger hatch-ai-provisioner workflow
        run: |
          echo "🔄 Triggering hatch-ai-provisioner to sync secrets to yoracle..."
          
          # Trigger the provisioner workflow via repository dispatch
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PROVISIONER_PAT }}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/fwl-tech/hatch-ai-provisioner/dispatches \
            -d '{
              "event_type": "provision-secrets",
              "client_payload": {
                "repository": "fwl-tech/yoracle",
                "environment": "production"
              }
            }'
          
          echo "✅ Provisioner workflow triggered successfully"
          echo ""
          echo "The provisioner will:"
          echo "  1. Copy secrets from hatch-ai-provisioner repo"
          echo "  2. Set them in yoracle repository"
          echo "  3. Sync them to Railway"
          echo ""
          echo "Monitor progress at:"
          echo "  https://github.com/fwl-tech/hatch-ai-provisioner/actions"
