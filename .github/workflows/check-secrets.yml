name: Check Secrets Configuration

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check which secrets are available
        run: |
          echo "🔍 Checking which secrets are configured..."
          echo ""
          echo "Railway Credentials:"
          echo "  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN != '' && '✓ SET' || '✗ MISSING' }}"
          echo "  RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID != '' && '✓ SET' || '✗ MISSING' }}"
          echo "  RAILWAY_ENVIRONMENT_ID: ${{ secrets.RAILWAY_ENVIRONMENT_ID != '' && '✓ SET' || '✗ MISSING' }}"
          echo ""
          echo "Supabase Credentials:"
          echo "  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL != '' && '✓ SET' || '✗ MISSING' }}"
          echo "  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY != '' && '✓ SET' || '✗ MISSING' }}"
          echo "  NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY != '' && '✓ SET' || '✗ MISSING' }}"
          echo ""
          echo "Clerk Credentials:"
          echo "  NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY != '' && '✓ SET' || '✗ MISSING' }}"
          echo "  CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY != '' && '✓ SET' || '✗ MISSING' }}"
          echo ""
          echo "Other Credentials:"
          echo "  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY != '' && '✓ SET' || '✗ MISSING' }}"
          echo "  CONNECTOR_ENCRYPTION_KEY: ${{ secrets.CONNECTOR_ENCRYPTION_KEY != '' && '✓ SET' || '✗ MISSING' }}"
          echo ""
          echo "================================================"
          echo ""
          echo "If secrets show as MISSING:"
          echo "1. Go to: https://github.com/fwl-tech/yoracle/settings/secrets/actions"
          echo "2. Verify secrets exist at REPOSITORY level (not environment/org)"
          echo "3. Check secret names match exactly (case-sensitive)"
          echo "4. Verify secret values are not empty"
